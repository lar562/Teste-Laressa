name: Fase 2 — Executar Testes e Publicar Resultados

on:
  push:
    branches: [main, develop]
    paths:
      - "tests/**"
  pull_request:
    paths:
      - "tests/**"
  workflow_dispatch:

jobs:
  executar-testes:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Inicializar Browser Library (Playwright)
        run: rfbrowser init

      - name: Executar testes Robot Framework
        run: |
          robot \
            --outputdir results/ \
            --listener allure_robotframework \
            tests/specs/
        continue-on-error: true   # garante que os passos seguintes rodem mesmo com falhas

      - name: Instalar Allure CLI
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxf allure-2.29.0.tgz
          echo "$PWD/allure-2.29.0/bin" >> $GITHUB_PATH

      - name: Gerar relatório Allure
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Publicar relatório no GitHub Pages
        id: allure
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: allure-report

      - name: Postar resultados de volta no Trello
        if: always()
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          TRELLO_LIST_TESTADO: ${{ secrets.TRELLO_LIST_TESTADO }}
          ALLURE_URL: "https://lar562.github.io/Teste-Laressa/allure-report"
        run: python scripts/trello_postar_resultado.py
